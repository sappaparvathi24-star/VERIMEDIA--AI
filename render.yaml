services:
  - type: web
    name: verimedia-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    rootDir: backend
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: verimedia-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        value: verimedia-assets
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "8000"
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: verimedia-db
    plan: free
    databaseName: verimedia
    user: verimedia
