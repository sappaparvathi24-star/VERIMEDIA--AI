services:
  - type: web
    name: verimedia-ai-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # You will paste this in the Render dashboard
      - key: PORT
        value: 3001
    autoDeploy: true
